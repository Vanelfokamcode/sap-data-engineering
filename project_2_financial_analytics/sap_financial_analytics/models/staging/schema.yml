version: 2

models:
  - name: stg_journal_entries
    description: "Journal Entry Items nettoyés depuis SAP_RAW"
    columns:
      - name: journal_entry_item_id
        description: "Clé primaire — ROW_ID depuis SAP_RAW"
        tests:
          - not_null
          - unique
      - name: company_code
        description: "Code société SAP"
        tests:
          - not_null
      - name: fiscal_year
        description: "Exercice fiscal"
        tests:
          - not_null
      - name: amount
        description: "Montant en devise locale"

  - name: stg_gl_accounts
    description: "GL Accounts nettoyés depuis SAP_RAW"
    columns:
      - name: gl_account
        description: "Numéro de compte GL — clé primaire"
        tests:
          - not_null
          - unique
      - name: chart_of_accounts
        description: "Plan comptable SAP"
        tests:
          - not_null
