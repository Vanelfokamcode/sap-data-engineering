version: 2

models:
  - name: fct_journal_entries
    description: "Journal Entries enrichies avec noms de comptes GL — table analytique principale"
    columns:
      - name: journal_entry_item_id
        description: "Clé primaire"
        tests:
          - not_null
          - unique
      - name: company_code
        description: "Code société SAP"
        tests:
          - not_null
      - name: fiscal_year
        description: "Exercice fiscal"
        tests:
          - not_null
      - name: gl_account
        description: "Numéro de compte GL"
      - name: gl_account_name
        description: "Nom du compte GL (NULL si pas de match — données sandbox)"
      - name: amount
        description: "Montant en devise locale"
      - name: currency_code
        description: "Code devise (ex: EUR)"
      - name: debit_credit_code
        description: "H = Crédit (Haben), S = Débit (Soll)"
      - name: debit_amount
        description: "Montant si débit, sinon 0"
      - name: credit_amount
        description: "Montant si crédit, sinon 0"

  - name: fct_balance_sheet
    description: "Balance Sheet SAP simplifie -- comptes de bilan agregés par GL Account"
    columns:
      - name: company_code
        description: "Code societe SAP"
        tests:
          - not_null
      - name: gl_account
        description: "Numero de compte GL"
        tests:
          - not_null
      - name: net_balance
        description: "Solde net = total_debit - total_credit"
      - name: balance_type
        description: "ASSET si net_balance >= 0, LIABILITY sinon"
        tests:
          - accepted_values:
              values: ['ASSET', 'LIABILITY']

  - name: fct_variance_analysis
    description: "Variance Analysis SAP -- Actuel vs Budget par compte GL"
    columns:
      - name: company_code
        tests:
          - not_null
      - name: gl_account
        tests:
          - not_null
      - name: budget_status
        description: "OVER_BUDGET, UNDER_BUDGET ou ON_BUDGET"
        tests:
          - accepted_values:
              values: ['OVER_BUDGET', 'UNDER_BUDGET', 'ON_BUDGET']
      - name: variance_amount
        description: "Actuel - Budget. Positif = depasse le budget."
